<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vector V2 - Cyber Control</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'neon-blue': '#00f3ff',
                        'neon-purple': '#bc13fe',
                        'neon-green': '#32ff09',
                        'neon-orange': '#ff9100',
                        'dark-bg': '#0a0a12',
                        'panel-bg': 'rgba(20, 20, 35, 0.9)',
                    },
                    fontFamily: {
                        'tech': ['Orbitron', 'sans-serif'],
                        'body': ['Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0a0a12;
            color: white;
            overflow: hidden;
            touch-action: none;
        }

        /* --- Slider Genel --- */
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
        }
        
        /* Thumb (Tutamaç) Boyutları - vh cinsinden orantılı */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 5vh; /* Ekran yüksekliğinin %5'i */
            width: 5vh;  /* Kare olması için aynı oran */
            border-radius: 50%;
            cursor: pointer;
            /* Ortalamak için margin hesabı: track yüksekliği (1.5vh) - thumb yüksekliği (5vh) / 2 */
            margin-top: -1.75vh; 
            box-shadow: 0 0 10px currentColor;
            background: white;
            border: 0.5vh solid currentColor;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 1.5vh; /* Track kalınlığı da orantılı */
            cursor: pointer;
            background: #333;
            border-radius: 1vh;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
        }

        /* Renkler */
        #armSlider::-webkit-slider-thumb { color: #bc13fe; }
        #headSlider::-webkit-slider-thumb { color: #ff9100; }
        #speedSlider::-webkit-slider-thumb { color: #00f3ff; }

        /* --- Dikey Slider --- */
        /* Flex wrapper, slider'ı ortalamak için */
       /* --- Dikey Slider --- */

.vertical-slider-container {
    position: relative; /* İçindeki absolute elemanı hizalamak için şart */
    display: flex;
    align-items: center;
    justify-content: center;
    
    /* Slider'ın DİKEY uzunluğu burada belirlenir */
    height: 50vh; /* Örnek: 40vh'den 50vh'ye çıkardık */
    width: 8vh;   /* Genişlik thumb kalınlığına göre kalabilir */
}

.vertical-slider {
    /* Flexbox sıkıştırmasını engellemek için absolute kullanıyoruz */
    position: absolute;
    top: 50%;
    left: 50%;
    
    /* Önce merkeze al (translate), sonra döndür (rotate) */
    transform: translate(-50%, -50%) rotate(-90deg);
    
    /* Slider'ın genişliği, kapsayıcının yüksekliği (height) ile AYNI olmalı */
    width: 43vh; /* Container height değeri ile eşleşmeli */
    
    /* Diğer ayarlar */
    margin: 0;
    transform-origin: center;
}

        /* --- Buton Efektleri --- */
        .neon-btn {
            transition: all 0.1s;
        }
        .neon-btn:active, .neon-btn.active {
            transform: scale(0.95);
            box-shadow: 0 0 2vh currentColor; /* Gölge de orantılı */
            background-color: currentColor;
            color: black !important;
        }

        /* Landscape Uyarısı */
        #rotate-message { display: none; }
        @media only screen and (orientation: portrait) {
            #main-interface { display: none; }
            #rotate-message { display: flex; }
        }
    </style>
</head>
<body class="h-screen w-screen font-body select-none flex flex-col">

    <!-- Oryantasyon Uyarısı -->
    <div id="rotate-message" class="fixed inset-0 z-50 bg-black flex flex-col items-center justify-center text-center p-5">
        <i class="fa-solid fa-mobile-screen-button fa-rotate-270 text-6xl text-neon-blue mb-4 animate-pulse"></i>
        <h1 class="text-2xl font-tech text-neon-blue">Yatay Çeviriniz</h1>
    </div>

    <!-- Ana Arayüz -->
    <div id="main-interface" class="flex-1 w-full flex flex-col p-[1vh] relative overflow-hidden">
        
        <!-- Üst Bar (Header): Yüksekliği vh ile sabitlendi (Örn: %12) -->

            <!-- Sol: Logo ve Durum -->
            <div class="flex items-center gap-[2vh]">

                    <span class="text-[3vh] tracking-wider hidden sm:inline">VECTOR V2</span>

            </div>

                <!-- Mod Seçici -->

    <!-- JAVASCRIPT -->
    <script>
        var gateway = `ws://${window.location.hostname}/ws`;
        var websocket;
        var currentMood = "DEFAULT"; 
        var direction = "STOP";

        window.addEventListener('load', onLoad);

        function onLoad(event) {
            initWebSocket();
            updateSliderDisplays();
        }

        function updateSliderDisplays() {
            document.getElementById('disp-head').innerText = document.getElementById('headSlider').value;
            document.getElementById('disp-arm').innerText = document.getElementById('armSlider').value;
            document.getElementById('disp-speed').innerText = document.getElementById('speedSlider').value;
        }

        function initWebSocket() {
            if (window.location.protocol === 'https:') {
                console.warn("HTTPS ortamında güvenli olmayan WebSocket (ws://) başlatılamaz.");
                log('Simülasyon Modu (Preview)');
                document.getElementById('connection-status').innerText = "SİMÜLASYON";
                document.getElementById('connection-status').className = "text-[1.8vh] px-[1vh] py-[0.5vh] rounded border border-blue-500 text-blue-300 bg-blue-900/50";
                return;
            }
            try {
                websocket = new WebSocket(gateway);
                websocket.onopen = onOpen;
                websocket.onclose = onClose;
                websocket.onmessage = onMessage;
            } catch (error) {
                console.log('WS Bağlantı hatası');
                log('Bağlantı Hatası (Cihaz Bulunamadı)');
            }
        }

        function onOpen(event) {
            log('Bağlantı KURULDU.');
            document.getElementById('connection-status').innerText = "BAĞLI";
            document.getElementById('connection-status').className = "text-[1.8vh] px-[1vh] py-[0.5vh] rounded border border-green-500 text-green-300 bg-green-900/50";
        }

        function onClose(event) {
            log('Bağlantı KOPTU. 2sn sonra tekrar deneniyor...');
            document.getElementById('connection-status').innerText = "BAĞLANTI YOK";
            document.getElementById('connection-status').className = "text-[1.8vh] px-[1vh] py-[0.5vh] rounded border border-red-500 text-red-300 bg-red-900/50";
            setTimeout(initWebSocket, 2000);
        }

        function onMessage(event) {
            log('Gelen: ' + event.data);
        }

        function toggleFullScreen() {
            var doc = window.document;
            var docEl = doc.documentElement;
            var requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            var cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

            if(!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                requestFullScreen.call(docEl);
                document.querySelector('#btn-fullscreen i').classList.remove('fa-expand');
                document.querySelector('#btn-fullscreen i').classList.add('fa-compress');
            } else {
                cancelFullScreen.call(doc);
                document.querySelector('#btn-fullscreen i').classList.add('fa-expand');
                document.querySelector('#btn-fullscreen i').classList.remove('fa-compress');
            }
        }

        function sendData() {
            updateSliderDisplays();
            var data = {
                arm: document.getElementById("armSlider").value,
                head: document.getElementById("headSlider").value,
                speed: document.getElementById("speedSlider").value,
                mood: currentMood,
                direction: direction,
            };
            if (websocket && websocket.readyState === WebSocket.OPEN) {
                websocket.send(JSON.stringify(data));
            }
            if (currentMood == "CONFUSED") {
                setTimeout(() => {
                    currentMood = "DEFAULT";
                }, 1000); 
            }
        }

        function updateDirection(dir) {
            direction = dir;
            sendData();
            if(dir !== 'STOP') log(`Yön: ${dir}`);
        }

        function updateMood(mood) {
            currentMood = mood;
            log(`Mod: ${mood}`);
            sendData();
        }

        function setUIMode(modeName) {
            document.getElementById('mode-manual').classList.add('hidden');
            document.getElementById('mode-semi').classList.add('hidden');
            document.getElementById('mode-auto').classList.add('hidden');
            resetBtnStyle('btn-manual');
            resetBtnStyle('btn-semi');
            resetBtnStyle('btn-auto');
            const activeBtn = document.getElementById(`btn-${modeName}`);
            activeBtn.classList.remove('text-gray-400');
            activeBtn.classList.add('bg-neon-blue', 'text-black', 'shadow-[0_0_10px_#00f3ff]');
            const activeView = document.getElementById(`mode-${modeName}`);
            activeView.classList.remove('hidden');
            activeView.classList.add('flex');
            
            // Auto moduna geçerken otomatik Random yollama, kullanıcı seçsin.
            if (modeName === 'auto') {
                log("Mod: OTO SEÇİMİ");
            } else if (modeName === 'manual') {
                currentMood = "DEFAULT";
                log("Mod: MANUEL");
                sendData();
            } else {
                log("Mod: MOD SEÇİMİ");
            }
        }

        function resetBtnStyle(btnId) {
            const btn = document.getElementById(btnId);
            btn.className = "px-[3vh] py-[1vh] rounded text-[2vh] font-bold transition-all text-gray-400 hover:text-white";
        }

        function log(msg) {
            const el = document.getElementById('system-log');
            el.innerText = msg;
            el.classList.remove('animate-pulse');
            void el.offsetWidth;
            el.classList.add('animate-pulse');
        }
    </script>
</body>
</html>
