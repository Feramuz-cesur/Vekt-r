<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vector V2 - Cyber Control</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap"
        rel="stylesheet">
    <link rel="icon" href="data:,">


    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'neon-blue': '#00f3ff',
                        'neon-purple': '#bc13fe',
                        'neon-green': '#32ff09',
                        'neon-orange': '#ff9100',
                        'dark-bg': '#0a0a12',
                        'panel-bg': 'rgba(20, 20, 35, 0.9)',
                    },
                    fontFamily: {
                        'tech': ['Orbitron', 'sans-serif'],
                        'body': ['Roboto', 'sans-serif'],
                    },
                    animation: {
                        'spin-slow': 'spin 3s linear infinite',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0a0a12;
            color: white;
            overflow: hidden;
            touch-action: none;
        }

        /* --- Slider Genel --- */
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 5vh;
            width: 5vh;
            border-radius: 50%;
            cursor: pointer;
            margin-top: -1.75vh;
            box-shadow: 0 0 10px currentColor;
            background: white;
            border: 0.5vh solid currentColor;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 1.5vh;
            cursor: pointer;
            background: #333;
            border-radius: 1vh;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
        }

        #armSlider::-webkit-slider-thumb {
            color: #bc13fe;
        }

        #headSlider::-webkit-slider-thumb {
            color: #ff9100;
        }

        #speedSlider::-webkit-slider-thumb {
            color: #00f3ff;
        }

        /* --- Dikey Slider --- */
        .vertical-slider-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 50vh;
            width: 8vh;
        }

        .vertical-slider {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-90deg);
            width: 43vh;
            margin: 0;
            transform-origin: center;
        }

        /* --- Buton Efektleri --- */
        .neon-btn {
            transition: all 0.1s;
        }

        .neon-btn:active,
        .neon-btn.active {
            transform: scale(0.95);
            box-shadow: 0 0 2vh currentColor;
            background-color: currentColor;
            color: black !important;
        }

        /* --- Kayıt Efektleri --- */
        @keyframes pulse-red {
            0% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }

        .recording-active {
            animation: pulse-red 2s infinite;
            border-color: #ef4444 !important;
            color: #ef4444 !important;
        }

        @keyframes pulse-green {
            0% {
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(34, 197, 94, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
            }
        }

        .playing-active {
            animation: pulse-green 2s infinite;
            border-color: #22c55e !important;
            color: #22c55e !important;
        }

        /* --- Renk Seçici (Color Input) --- */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 10vh;
            height: 10vh;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
            padding: 0;
            background: none;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 2px solid #fff;
            border-radius: 50%;
        }

        /* Landscape Uyarısı */
        #rotate-message {
            display: none;
        }

        @media only screen and (orientation: portrait) {
            #main-interface {
                display: none;
            }

            #rotate-message {
                display: flex;
            }
        }
    </style>
</head>

<body class="h-screen w-screen font-body select-none flex flex-col">

    <!-- Oryantasyon Uyarısı -->
    <div id="rotate-message"
        class="fixed inset-0 z-50 bg-black flex flex-col items-center justify-center text-center p-5">
        <i class="fa-solid fa-mobile-screen-button fa-rotate-270 text-6xl text-neon-blue mb-4 animate-pulse"></i>
        <h1 class="text-2xl font-tech text-neon-blue">Yatay Çeviriniz</h1>
    </div>

    <!-- RGB MODAL (POPUP PENCERE) -->
    <div id="rgb-modal"
        class="hidden fixed inset-0 z-50 bg-black/90 flex items-center justify-center backdrop-blur-sm transition-opacity duration-300">
        <div
            class="bg-gray-900 border-2 border-neon-blue rounded-2xl p-[3vh] w-[70vh] flex flex-col items-center shadow-[0_0_50px_rgba(0,243,255,0.2)] relative">

            <!-- Kapatma Butonu (X) -->
            <button onclick="toggleRGBModal()"
                class="absolute top-[2vh] right-[2vh] text-gray-400 hover:text-white text-[4vh] w-[6vh] h-[6vh] flex items-center justify-center rounded-full hover:bg-gray-800 transition-colors">
                <i class="fa-solid fa-xmark"></i>
            </button>

            <h2 class="text-[3.5vh] font-tech text-neon-blue mb-[4vh] flex items-center gap-[1.5vh]">
                <i class="fa-solid fa-lightbulb"></i> IŞIK KONTROLÜ
            </h2>

            <div class="flex w-full gap-[4vh]">
                <!-- Sol Taraf: Renk Seçici -->
                <div class="flex flex-col items-center justify-center w-1/3 border-r border-gray-700 pr-[2vh]">
                    <div class="relative group">
                        <div
                            class="absolute inset-0 bg-white/20 rounded-full blur opacity-0 group-hover:opacity-100 transition-opacity duration-500">
                        </div>
                        <input type="color" id="colorPicker" value="#00f3ff" onchange="updateLight('STATIC')"
                            class="relative z-10 shadow-[0_0_20px_rgba(255,255,255,0.3)] hover:scale-105 transition-transform">
                    </div>
                    <span class="text-gray-400 text-[2vh] mt-[2vh] font-tech tracking-widest">RENK SEÇ</span>
                </div>

                <!-- Sağ Taraf: Efekt Butonları -->
                <div class="grid grid-cols-2 gap-[2vh] w-2/3">
                    <button onclick="updateLight('STATIC')"
                        class="bg-gray-800 border border-gray-600 hover:bg-gray-700 text-white py-[2vh] rounded-xl font-bold text-[2vh] transition-all active:scale-95 shadow-lg flex flex-col items-center gap-[0.5vh]">
                        <i class="fa-solid fa-fill-drip text-neon-blue"></i> SABİT RENK
                    </button>
                    <button onclick="updateLight('PULSE')"
                        class="bg-gray-800 border border-neon-purple text-neon-purple hover:bg-neon-purple/20 py-[2vh] rounded-xl font-bold text-[2vh] transition-all active:scale-95 shadow-[0_0_10px_#bc13fe_inset] flex flex-col items-center gap-[0.5vh]">
                        <i class="fa-solid fa-heart-pulse"></i> NEFES
                    </button>
                    <button onclick="updateLight('RAINBOW')"
                        class="col-span-2 bg-gradient-to-r from-red-500 via-green-500 to-blue-500 text-white py-[2vh] rounded-xl font-bold text-[2vh] transition-all active:scale-95 opacity-90 hover:opacity-100 shadow-[0_0_15px_rgba(255,255,255,0.3)] flex items-center justify-center gap-[1.5vh]">
                        <i class="fa-solid fa-rainbow"></i> GÖKKUŞAĞI MODU
                    </button>
                    <button onclick="updateLight('POLICE')"
                        class="col-span-2 bg-gray-900 border border-red-500 text-red-500 hover:bg-red-900/30 py-[2vh] rounded-xl font-bold text-[2vh] transition-all active:scale-95 flex items-center justify-center gap-[1.5vh]">
                        <i class="fa-solid fa-taxi"></i> POLİS ÇAKARI
                    </button>
                </div>
            </div>

            <!-- Alt Kısım: Kapatma -->
            <div class="w-full mt-[4vh] border-t border-gray-700 pt-[3vh]">
                <button id="btn-light-power" onclick="toggleLightPower()"
                    class="w-full bg-green-900/40 border border-green-600 text-green-200 py-[2vh] rounded-xl font-bold text-[2.2vh] hover:bg-green-600 hover:text-white transition-all active:scale-95 flex items-center justify-center gap-[1vh]">
                    <i class="fa-solid fa-power-off"></i> <span id="light-power-label">IŞIKLARI AÇ</span>
                </button>
            </div>
        </div>
    </div>

    <!-- VOLUME MODAL (POPUP PENCERE) -->
    <div id="volume-modal"
        class="hidden fixed inset-0 z-50 bg-black/90 flex items-center justify-center backdrop-blur-sm transition-opacity duration-300">
        <div
            class="bg-gray-900 border-2 border-neon-blue rounded-2xl p-[3vh] w-[70vh] flex flex-col items-center shadow-[0_0_50px_rgba(0,243,255,0.2)] relative">

            <!-- Kapatma Butonu (X) -->
            <button onclick="toggleVolumeModal()"
                class="absolute top-[2vh] right-[2vh] text-gray-400 hover:text-white text-[4vh] w-[6vh] h-[6vh] flex items-center justify-center rounded-full hover:bg-gray-800 transition-colors">
                <i class="fa-solid fa-xmark"></i>
            </button>

            <h2 class="text-[3.5vh] font-tech text-neon-blue mb-[1vh] flex items-center gap-[1.5vh]">
                <i class="fa-solid fa-volume-high"></i> SES KONTROLÜ
            </h2>

            <!-- Slider ve Değer Göstergesi -->
            <div class="flex flex-col w-full items-center mt-[4vh] mb-[2vh]">
                <div
                    class="w-[80%] bg-gray-900/50 p-[2vh] rounded-xl border border-gray-700 flex flex-col items-center">
                    <span id="disp-volume" class="text-[5vh] font-tech text-neon-blue font-bold mb-[2vh]">30</span>
                    <input id="volumeSlider" type="range" class="w-full" min="0" max="30" step="1" value="30"
                        oninput="sendVolume()">
                </div>
                <span class="text-gray-500 text-[1.8vh] font-tech mt-[2vh] tracking-widest text-center">ROBOTUN SES
                    SEVİYESİNİ AYARLAYIN (0-30)</span>
            </div>

        </div>
    </div>

    <!-- Ana Arayüz -->
    <div id="main-interface" class="flex-1 w-full flex flex-col p-[1vh] relative overflow-hidden">

        <!-- Üst Bar (Header) -->
        <header
            class="flex justify-between items-center bg-panel-bg border-b border-gray-700 px-[2vh] rounded-t-lg shrink-0 h-[9vh] gap-4 relative">
            <!-- Sol: Logo ve Durum -->
            <div class="flex items-center gap-[2vh]">
                <div class="flex items-center gap-[1vh] text-neon-blue font-tech">
                    <i class="fa-solid fa-robot text-[4vh]"></i>
                    <span class="text-[3vh] tracking-wider hidden sm:inline">VECTOR V2</span>
                </div>
                <div id="connection-status"
                    class="text-[1.8vh] px-[1vh] py-[0.5vh] rounded border border-red-500 text-red-300 bg-red-900/50">
                    BAĞLANTI YOK
                </div>
                <!-- YENİ: Pil Göstergesi -->
                <div id="battery-status"
                    class="flex items-center gap-[0.5vh] bg-gray-900 border border-gray-700 rounded px-[1vh] py-[0.5vh] text-[1.8vh]">
                    <i id="battery-icon" class="fa-solid fa-battery-half text-yellow-500"></i>
                    <span id="battery-text" class="text-white font-bold font-tech">--%</span>
                </div>
            </div>

            <!-- Orta: Kayıt ve Oynatma Butonları (Mutlak Merkezleme ve Büyütülmüş Fontlar) -->
            <div id="record-controls"
                class="absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 flex items-center gap-[1.5vh] bg-gray-900 rounded-lg p-[0.8vh] border border-gray-700 shadow-lg z-10">
                <button id="btn-record" onclick="toggleRecording()"
                    class="bg-gray-800 text-gray-400 hover:text-white px-[2.5vh] py-[1.2vh] rounded text-[2vh] font-bold transition-all shadow-md flex items-center gap-[1.2vh] active:scale-95"
                    title="Hareketi Kaydet">
                    <i id="icon-record" class="fa-solid fa-circle text-red-500 text-[2.2vh]"></i>
                    <span id="text-record" class="hidden sm:inline">KAYDET</span>
                </button>

                <div id="recording-timer"
                    class="hidden text-red-500 font-tech text-[2.2vh] w-[9vh] text-center font-bold tracking-widest bg-red-900/40 rounded px-[0.5vh] py-[0.5vh] border border-red-500/50">
                    00:00
                </div>

                <div class="w-[2px] h-[3.5vh] bg-gray-700 mx-[0.5vh]"></div>

                <button id="btn-play" onclick="togglePlayback()"
                    class="bg-gray-800 text-gray-400 hover:text-white px-[2.5vh] py-[1.2vh] rounded text-[2vh] font-bold transition-all shadow-md flex items-center gap-[1.2vh] active:scale-95 opacity-50 cursor-not-allowed"
                    title="Kaydı Oynat" disabled>
                    <i id="icon-play" class="fa-solid fa-play text-green-500 text-[2.2vh]"></i>
                    <span id="text-play" class="hidden sm:inline">OYNAT</span>
                </button>
            </div>

            <!-- Sağ: Modlar ve Tam Ekran -->
            <div class="flex items-center gap-[1vh]">

                <!-- *** YENİ SAAT BUTONU *** -->
                <button onclick="requestClockShow()"
                    class="bg-gray-800 border border-green-500 text-green-400 hover:text-white hover:bg-green-600/50 w-[6vh] h-[5vh] rounded text-[2vh] flex items-center justify-center transition-all shadow-[0_0_10px_#22c55e] mr-[1vh] active:scale-90"
                    title="Saati Göster">
                    <i class="fa-solid fa-clock text-[2.5vh]"></i>
                </button>

                <!-- *** YENİ SES BUTONU *** -->
                <button onclick="toggleVolumeModal()"
                    class="bg-gray-800 border border-neon-blue text-neon-blue hover:text-white hover:bg-neon-blue/50 w-[6vh] h-[5vh] rounded text-[2vh] flex items-center justify-center transition-all shadow-[0_0_10px_#00f3ff] mr-[1vh] active:scale-90"
                    title="Ses Kontrolü">
                    <i class="fa-solid fa-volume-high text-[2.5vh]"></i>
                </button>

                <!-- *** YENİ RGB BUTONU *** -->
                <button onclick="toggleRGBModal()"
                    class="bg-gray-800 border border-yellow-500 text-yellow-400 hover:text-white hover:bg-yellow-600/50 w-[6vh] h-[5vh] rounded text-[2vh] flex items-center justify-center transition-all shadow-[0_0_10px_#eab308] mr-[1vh] active:scale-90"
                    title="Işık Kontrolü">
                    <i class="fa-solid fa-lightbulb text-[2.5vh]"></i>
                </button>

                <!-- Mod Seçici -->
                <div class="flex bg-gray-900 rounded-lg p-[0.5vh] gap-[0.5vh]">
                    <button onclick="setUIMode('manual')" id="btn-manual"
                        class="px-[3vh] py-[1vh] rounded text-[2vh] font-bold transition-all bg-neon-blue text-black shadow-[0_0_10px_#00f3ff]">MANUEL</button>
                    <button onclick="setUIMode('auto')" id="btn-auto"
                        class="px-[3vh] py-[1vh] rounded text-[2vh] font-bold transition-all text-gray-400 hover:text-white">AUTO</button>
                </div>

                <!-- Tam Ekran Butonu -->
                <button onclick="toggleFullScreen()" id="btn-fullscreen"
                    class="bg-gray-800 border border-gray-600 text-gray-300 hover:text-white hover:border-white w-[5vh] h-[5vh] rounded text-[2vh] flex items-center justify-center transition-all ml-[1vh]"
                    title="Tam Ekran">
                    <i class="fa-solid fa-expand"></i>
                </button>
            </div>
        </header>

        <!-- İçerik Alanı (Main) -->
        <main class="flex-1 relative mt-[1vh] overflow-hidden flex gap-[1vh]">

            <!-- 1. MANUEL PANEL -->
            <div id="mode-manual" class="w-full h-full flex gap-[2vh]">
                <!-- Sol: Joystick -->
                <div
                    class="w-1/2 bg-panel-bg rounded-lg border border-gray-800 flex items-center justify-center relative p-[2vh]">
                    <span class="absolute top-[1vh] left-[2vh] text-[2vh] text-gray-500 font-tech">HAREKET</span>
                    <div class="grid grid-cols-3 gap-[2vh] p-[2vh] bg-gray-900/50 rounded-full border border-gray-700">
                        <div></div>
                        <button id="btn-forward"
                            class="w-[18vh] h-[18vh] bg-gray-800 rounded-xl border-2 border-neon-blue text-neon-blue neon-btn flex items-center justify-center text-[6vh]"
                            onmousedown="updateDirection('FORWARD')" onmouseup="updateDirection('STOP')"
                            ontouchstart="updateDirection('FORWARD')" ontouchend="updateDirection('STOP')">
                            <i class="fa-solid fa-arrow-up"></i>
                        </button>
                        <div></div>
                        <button id="btn-left"
                            class="w-[18vh] h-[18vh] bg-gray-800 rounded-xl border-2 border-neon-blue text-neon-blue neon-btn flex items-center justify-center text-[6vh]"
                            onmousedown="updateDirection('LEFT')" onmouseup="updateDirection('STOP')"
                            ontouchstart="updateDirection('LEFT')" ontouchend="updateDirection('STOP')">
                            <i class="fa-solid fa-arrow-left"></i>
                        </button>
                        <div
                            class="w-[18vh] h-[18vh] bg-black rounded-full flex items-center justify-center border border-gray-700">
                            <i class="fa-solid fa-crosshairs text-gray-600 text-[5vh]"></i>
                        </div>
                        <button id="btn-right"
                            class="w-[18vh] h-[18vh] bg-gray-800 rounded-xl border-2 border-neon-blue text-neon-blue neon-btn flex items-center justify-center text-[6vh]"
                            onmousedown="updateDirection('RIGHT')" onmouseup="updateDirection('STOP')"
                            ontouchstart="updateDirection('RIGHT')" ontouchend="updateDirection('STOP')">
                            <i class="fa-solid fa-arrow-right"></i>
                        </button>
                        <div></div>
                        <button id="btn-backward"
                            class="w-[18vh] h-[18vh] bg-gray-800 rounded-xl border-2 border-neon-blue text-neon-blue neon-btn flex items-center justify-center text-[6vh]"
                            onmousedown="updateDirection('BACKWARD')" onmouseup="updateDirection('STOP')"
                            ontouchstart="updateDirection('BACKWARD')" ontouchend="updateDirection('STOP')">
                            <i class="fa-solid fa-arrow-down"></i>
                        </button>
                        <div></div>
                    </div>
                </div>

                <!-- Sağ: Mekanik Kontroller -->
                <div
                    class="w-1/2 bg-panel-bg rounded-lg border border-gray-800 p-[2vh] flex flex-col justify-between relative">
                    <span class="absolute top-[1vh] left-[2vh] text-[2vh] text-gray-500 font-tech">MEKANİK & HIZ</span>
                    <div class="flex flex-1 items-center justify-around w-full mt-[3vh]">
                        <div class="flex flex-col items-center">
                            <div class="vertical-slider-container  bg-gray-900 rounded-full border border-gray-700">
                                <input id="headSlider" class="vertical-slider" type="range" min="0" max="60" step="1"
                                    value="30" oninput="sendData()">
                            </div>
                            <span class="mt-[1.5vh] text-[2vh] font-bold text-neon-orange font-tech">KAFA</span>
                            <span id="disp-head" class="text-[1.8vh] text-gray-400">30</span>
                        </div>
                        <div class="flex flex-col items-center">
                            <div class="vertical-slider-container bg-gray-900 rounded-full border border-gray-700">
                                <input id="armSlider" class="vertical-slider" type="range" min="0" max="70" step="1"
                                    value="0" oninput="sendData()">
                            </div>
                            <span class="mt-[1.5vh] text-[2vh] font-bold text-neon-purple font-tech">KOL</span>
                            <span id="disp-arm" class="text-[1.8vh] text-gray-400">0</span>
                        </div>
                    </div>
                    <div class="w-full bg-gray-900/50 p-[1.5vh] rounded-xl border border-gray-700 mt-[1vh] mb-[1vh]">
                        <div class="flex justify-between mb-[0.5vh]">
                            <span class="text-[1.8vh] text-neon-blue font-bold">MOTOR HIZI</span>
                            <span id="disp-speed" class="text-[1.8vh] text-white">0</span>
                        </div>
                        <input id="speedSlider" type="range" class="w-full" min="0" max="254" step="1" value="70"
                            oninput="sendData()">
                    </div>
                </div>
            </div>

            <!-- 2. AUTO MOD (DANS PANELI) -->
            <div id="mode-auto"
                class="w-full h-full hidden bg-panel-bg rounded-lg border border-gray-800 p-[2vh] flex flex-col relative">
                <span class="absolute top-[1vh] left-[2vh] text-[1.8vh] text-gray-500 font-tech">OTONOM DANSLAR &
                    MODLAR</span>
                <div class="flex gap-[1.2vh] w-full h-full pt-[4vh]">
                    <div class="grid grid-cols-4 grid-rows-2 gap-[1.2vh] flex-1">
                        <button onclick="updateMood('DANCE_1')"
                            class="flex flex-col items-center justify-center bg-gray-900 border border-neon-blue/30 rounded-xl hover:bg-neon-blue/20 active:scale-95 transition-all p-[0.8vh] group shadow-[0_0_5px_rgba(0,243,255,0.1)]"><i
                                class="fa-solid fa-music text-[3.2vh] text-neon-blue mb-[0.6vh] group-hover:scale-110 transition-transform"></i><span
                                class="font-tech text-[1.2vh] text-neon-blue">DANCE 1</span></button>
                        <button onclick="updateMood('DANCE_2')"
                            class="flex flex-col items-center justify-center bg-gray-900 border border-neon-blue/30 rounded-xl hover:bg-neon-blue/20 active:scale-95 transition-all p-[0.8vh] group shadow-[0_0_5px_rgba(0,243,255,0.1)]"><i
                                class="fa-solid fa-robot text-[3.2vh] text-neon-blue mb-[0.6vh] group-hover:scale-110 transition-transform"></i><span
                                class="font-tech text-[1.2vh] text-neon-blue">DANCE 2</span></button>
                        <button onclick="updateMood('DANCE_3')"
                            class="flex flex-col items-center justify-center bg-gray-900 border border-neon-blue/30 rounded-xl hover:bg-neon-blue/20 active:scale-95 transition-all p-[0.8vh] group shadow-[0_0_5px_rgba(0,243,255,0.1)]"><i
                                class="fa-solid fa-bolt text-[3.2vh] text-neon-blue mb-[0.6vh] group-hover:scale-110 transition-transform"></i><span
                                class="font-tech text-[1.2vh] text-neon-blue">DANCE 3</span></button>
                        <button onclick="updateMood('DANCE_4')"
                            class="flex flex-col items-center justify-center bg-gray-900 border border-neon-blue/30 rounded-xl hover:bg-neon-blue/20 active:scale-95 transition-all p-[0.8vh] group shadow-[0_0_5px_rgba(0,243,255,0.1)]"><i
                                class="fa-solid fa-wand-magic-sparkles text-[3.2vh] text-neon-blue mb-[0.6vh] group-hover:scale-110 transition-transform"></i><span
                                class="font-tech text-[1.2vh] text-neon-blue">DANCE 4</span></button>
                        <button onclick="updateMood('DANCE_5')"

                                class="fa-solid fa-compact-disc text-[3.2vh] text-neon-blue mb-[0.6vh] group-hover:scale-110 transition-transform animate-spin-slow"></i><span

                                class="font-tech text-[1.2vh] text-neon-blue">DANCE 7</span></button>

                            class="flex flex-col items-center justify-center bg-gray-900 border border-neon-purple rounded-xl hover:bg-neon-purple hover:text-black active:scale-95 transition-all p-[0.8vh] group shadow-[0_0_15px_#bc13fe]"><i
                                class="fa-solid fa-shuffle text-[3.2vh] text-neon-purple group-hover:text-black mb-[0.6vh] group-hover:rotate-180 transition-all duration-500"></i><span

                                class="fa-solid fa-face-angry text-[2.6vh] text-red-500"></i><span

                        <button onclick="updateMood('TIRED')"
                            class="mood-btn bg-gray-900 border border-blue-500/40 rounded-xl hover:bg-blue-900/20 active:scale-95 transition-all p-[0.6vh] flex flex-col items-center justify-center"><i
                                class="fa-solid fa-face-sad-tear text-[2.6vh] text-blue-400"></i><span
                                class="font-tech text-[1.1vh] text-blue-400">YORGUN</span></button>
                        <button onclick="updateMood('CONFUSED')"
                            class="mood-btn bg-gray-900 border border-yellow-500/40 rounded-xl hover:bg-yellow-900/20 active:scale-95 transition-all p-[0.6vh] flex flex-col items-center justify-center"><i
                                class="fa-solid fa-face-dizzy text-[2.6vh] text-yellow-400"></i><span
                                class="font-tech text-[1.1vh] text-yellow-400">ŞAŞKIN</span></button>
                        <button onclick="updateMood('DEFAULT')"
                            class="mood-btn bg-gray-900 border border-gray-500/40 rounded-xl hover:bg-gray-800 active:scale-95 transition-all p-[0.6vh] flex flex-col items-center justify-center"><i
                                class="fa-solid fa-face-smile text-[2.6vh] text-gray-300"></i><span
                                class="font-tech text-[1.1vh] text-gray-300">NORMAL</span></button>
                    </div>
                </div>
            </div>

        </main>

        <!-- Alt Bilgi (Footer) -->
        <footer
            class="h-[5vh] mt-[0.5vh] flex items-center text-[1.5vh] font-mono text-gray-500 px-[2vh] bg-black border-t border-gray-800 shrink-0">
            <span class="text-green-500 mr-[1vh]">></span> <span id="system-log">Sistem Hazır.</span>
        </footer>

        <!-- Oynatma Sırasında Kontrol Kilidi (Overlay) -->
        <div id="playback-overlay"
            class="hidden absolute top-[9vh] inset-x-0 bottom-[5.5vh] z-40 bg-black/60 backdrop-blur-[1px] flex flex-col items-center justify-center pointer-events-auto">
            <div
                class="bg-gray-900 border-2 border-green-500 rounded-2xl p-[3vh] flex flex-col items-center shadow-[0_0_30px_rgba(34,197,94,0.3)] animate-pulse">
                <i class="fa-solid fa-robot text-[6vh] text-green-500 mb-[2vh]"></i>
                <h2 class="text-[3vh] font-tech text-green-400 text-center">OTOMATİK OYNATMA<br>AKTİF</h2>
                <p class="text-gray-400 mt-[1vh] font-tech text-[1.5vh]">Manuel kontroller geçici olarak kilitlendi.</p>
            </div>
        </div>

    </div>

    <!-- JAVASCRIPT -->
    <script>
        var gateway = `ws://${window.location.hostname}/ws`;
        var websocket;
        var currentMood = "DEFAULT";
        var direction = "STOP";
        var currentLightMode = "OFF";

        // Mevcut durumu sakla (Sayfa yenilenince veya modal açılınca sıfırlanmasın)
        var currentArm = 0;
        var currentHead = 30;
        var currentSpeed = 70;
        var currentVolume = 30;

        window.addEventListener('load', onLoad);

        function onLoad(event) {
            initWebSocket();
            // Sayfa yüklendiğinde slider değerlerini al
            updateSliderVariables();
            updateSliderDisplays();
            refreshLightPowerButton();
        }

        // Slider değişince değişkenleri güncelle
        function updateSliderVariables() {
            currentHead = document.getElementById('headSlider').value;
            currentArm = document.getElementById('armSlider').value;
            currentSpeed = document.getElementById('speedSlider').value;
            currentVolume = document.getElementById('volumeSlider').value;
        }

        // Ekrana değerleri yazdır
        function updateSliderDisplays() {
            document.getElementById('disp-head').innerText = currentHead;
            document.getElementById('disp-arm').innerText = currentArm;
            document.getElementById('disp-speed').innerText = currentSpeed;
            document.getElementById('disp-volume').innerText = currentVolume;
        }

        function initWebSocket() {
            if (window.location.protocol === 'https:') {
                console.warn("HTTPS ortamında güvenli olmayan WebSocket (ws://) başlatılamaz.");
                log('Simülasyon Modu (Preview)');
                document.getElementById('connection-status').innerText = "SİMÜLASYON";
                document.getElementById('connection-status').className = "text-[1.8vh] px-[1vh] py-[0.5vh] rounded border border-blue-500 text-blue-300 bg-blue-900/50";
                return;
            }
            try {
                websocket = new WebSocket(gateway);
                websocket.onopen = onOpen;
                websocket.onclose = onClose;
                websocket.onmessage = onMessage;
            } catch (error) {
                console.log('WS Bağlantı hatası');
                log('Bağlantı Hatası (Cihaz Bulunamadı)');
            }
        }

        function onOpen(event) {
            log('Bağlantı KURULDU.');
            document.getElementById('connection-status').innerText = "BAĞLI";
            document.getElementById('connection-status').className = "text-[1.8vh] px-[1vh] py-[0.5vh] rounded border border-green-500 text-green-300 bg-green-900/50";
        }

        function onClose(event) {
            log('Bağlantı KOPTU. 2sn sonra tekrar deneniyor...');
            document.getElementById('connection-status').innerText = "BAĞLANTI YOK";
            document.getElementById('connection-status').className = "text-[1.8vh] px-[1vh] py-[0.5vh] rounded border border-red-500 text-red-300 bg-red-900/50";
            setTimeout(initWebSocket, 2000);
        }

        function onMessage(event) {
            log('Gelen: ' + event.data);
            try {
                let data = JSON.parse(event.data);
                if (data.battery !== undefined) {
                    updateBatteryUI(data.battery);
                }
            } catch (e) {
                // JSON değilse yoksay
            }
        }

        function updateBatteryUI(percentage) {
            const batText = document.getElementById('battery-text');
            const batIcon = document.getElementById('battery-icon');

            batText.innerText = percentage + "%";

            // Yüzdeye göre ikon ve renk değiştirme
            batIcon.className = "fa-solid";
            if (percentage >= 80) {
                batIcon.classList.add('fa-battery-full', 'text-green-500');
            } else if (percentage >= 60) {
                batIcon.classList.add('fa-battery-three-quarters', 'text-green-400');
            } else if (percentage >= 40) {
                batIcon.classList.add('fa-battery-half', 'text-yellow-500');
            } else if (percentage >= 20) {
                batIcon.classList.add('fa-battery-quarter', 'text-orange-500');
            } else {
                batIcon.classList.add('fa-battery-empty', 'text-red-600', 'animate-pulse');
                batText.classList.add('text-red-500', 'animate-pulse');
            }

            // Eğer yüzde düşük değilse kırmızı alarmı kaldır
            if (percentage >= 20) {
                batText.classList.remove('text-red-500', 'animate-pulse');
            }
        }

        function toggleFullScreen() {
            var doc = window.document;
            var docEl = doc.documentElement;
            var requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            var cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

            if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                requestFullScreen.call(docEl);
                document.querySelector('#btn-fullscreen i').classList.remove('fa-expand');
                document.querySelector('#btn-fullscreen i').classList.add('fa-compress');
            } else {
                cancelFullScreen.call(doc);
                document.querySelector('#btn-fullscreen i').classList.add('fa-expand');
                document.querySelector('#btn-fullscreen i').classList.remove('fa-compress');
            }
        }

        // *** RGB MODAL FONKSİYONLARI ***
        function toggleRGBModal() {
            const modal = document.getElementById('rgb-modal');
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        // *** VOLUME MODAL FONKSİYONLARI ***
        function toggleVolumeModal() {
            const modal = document.getElementById('volume-modal');
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        function toggleLightPower() {
            if (currentLightMode === 'OFF') {
                updateLight('STATIC');
            } else {
                updateLight('OFF');
            }
        }

        function refreshLightPowerButton() {
            const btn = document.getElementById('btn-light-power');
            const label = document.getElementById('light-power-label');
            if (!btn || !label) return;

            if (currentLightMode === 'OFF') {
                label.innerText = 'IŞIKLARI AÇ';
                btn.className = "w-full bg-green-900/40 border border-green-600 text-green-200 py-[2vh] rounded-xl font-bold text-[2.2vh] hover:bg-green-600 hover:text-white transition-all active:scale-95 flex items-center justify-center gap-[1vh]";
            } else {
                label.innerText = 'IŞIKLARI KAPAT';
                btn.className = "w-full bg-red-900/40 border border-red-600 text-red-200 py-[2vh] rounded-xl font-bold text-[2.2vh] hover:bg-red-600 hover:text-white transition-all active:scale-95 flex items-center justify-center gap-[1vh]";
            }
        }

        function updateLight(mode) {
            const color = document.getElementById('colorPicker').value;
            currentLightMode = mode;
            refreshLightPowerButton();

            // Sadece ışık bilgisini gönderelim
            // C++ kodu eksik parametre gelirse diğerlerini değiştirmiyor
            var data = {
                lightMode: mode,
                color: color,
                // Yine de motor durmasın diye mevcut hızı ve yönü ekleyebiliriz ama
                // C++ tarafında 'direction' yoksa işlem yapmıyor, bu yüzden güvenli.
            };

            console.log("ESP'ye Giden Veri (Işık):", data);
            if (websocket && websocket.readyState === WebSocket.OPEN) {
                websocket.send(JSON.stringify(data));
            }
            log("Işık: " + mode);
        }

        // Ses seviyesi gönder
        function sendVolume() {
            updateSliderVariables();
            updateSliderDisplays();

            var data = {
                volume: currentVolume
            };

            console.log("ESP'ye Giden Veri (Ses):", data);
            if (websocket && websocket.readyState === WebSocket.OPEN) {
                websocket.send(JSON.stringify(data));
            }
        }

        // Saati ESP32'de ekrana ver
        function requestClockShow() {
            var data = {
                command: "showClock"
            };
            console.log("ESP'ye Giden Veri (Saat):", data);
            if (websocket && websocket.readyState === WebSocket.OPEN) {
                websocket.send(JSON.stringify(data));
            }
            log("Komut: Saat Istendi");
        }

        // Normal Slider ve Hareket Fonksiyonu
        function sendData() {
            updateSliderVariables(); // Değerleri güncelle
            updateSliderDisplays();  // Ekrana yaz

            var data = {
                arm: currentArm,
                head: currentHead,
                speed: currentSpeed,
                mood: currentMood,
                direction: direction,
            };

            // EĞER KAYIT AÇIKSA, BU VERİ PAKETİNİ LİSTEYE EKLE
            if (typeof recordDataPacket === "function") {
                recordDataPacket(data);
            }

            console.log("ESP'ye Giden Veri (Hareket/Mod):", data);
            if (websocket && websocket.readyState === WebSocket.OPEN) {
                websocket.send(JSON.stringify(data));
            }
            if (currentMood == "CONFUSED") {
                setTimeout(() => {
                    currentMood = "DEFAULT";
                }, 1000);
            }
        }

        function updateDirection(dir) {
            direction = dir;
            sendData();
            if (dir !== 'STOP') log(`Yön: ${dir}`);
        }

        function updateMood(mood) {
            currentMood = mood;
            log(`Mod: ${mood}`);
            sendData();
        }

        function setUIMode(modeName) {
            document.getElementById('mode-manual').classList.add('hidden');
            document.getElementById('mode-auto').classList.add('hidden');
            resetBtnStyle('btn-manual');
            resetBtnStyle('btn-auto');
            const activeBtn = document.getElementById(`btn-${modeName}`);
            activeBtn.classList.remove('text-gray-400');
            activeBtn.classList.add('bg-neon-blue', 'text-black', 'shadow-[0_0_10px_#00f3ff]');
            const activeView = document.getElementById(`mode-${modeName}`);
            activeView.classList.remove('hidden');
            activeView.classList.add('flex');

            if (modeName === 'auto') {
                log("Mod: OTO SEÇİMİ");
            } else {
                currentMood = "DEFAULT";
                log("Mod: MANUEL");
                sendData();
            }
        }

        function resetBtnStyle(btnId) {
            const btn = document.getElementById(btnId);
            btn.className = "px-[3vh] py-[1vh] rounded text-[2vh] font-bold transition-all text-gray-400 hover:text-white";
        }

        function log(msg) {
            const el = document.getElementById('system-log');
            el.innerText = msg;
            el.classList.remove('animate-pulse');
            void el.offsetWidth;
            el.classList.add('animate-pulse');
        }

        // ==========================================
        // HAREKET KAYIT VE OYNATMA SİSTEMİ
        // ==========================================

        // Kayıt Durumu Değişkenleri
        let isRecording = false;
        let isPlaying = false;
        let recordedData = [];          // Kaydedilen paketlerin listesi
        let recordingStartTime = 0;     // Kaydın başladığı an (milisaniye)
        let recordTimerInterval = null; // Ekrandaki sayacı güncelleyen interval
        let playbackTimeouts = [];      // Oynatılırken ayarlanan timeout'ları iptal etmek için
        const MAX_RECORDING_TIME_MS = 3 * 60 * 1000; // 3 Dakika (180,000 ms)

        // 1. Arayüz Güncellemeleri
        function updateRecordingUI() {
            const btnRecord = document.getElementById('btn-record');
            const iconRecord = document.getElementById('icon-record');
            const textRecord = document.getElementById('text-record');
            const timerDisplay = document.getElementById('recording-timer');
            const btnPlay = document.getElementById('btn-play');

            if (isRecording) {
                // Kayıt Devam Ediyor
                btnRecord.classList.add('recording-active');
                iconRecord.className = "fa-solid fa-square text-red-500";
                textRecord.innerText = "DURDUR";
                timerDisplay.classList.remove('hidden');

                // Oynat butonunu tamamen deaktif et
                btnPlay.disabled = true;
                btnPlay.classList.add('opacity-50', 'cursor-not-allowed');
                btnPlay.classList.remove('hover:text-white');
            } else {
                // Kayıt Durdu
                btnRecord.classList.remove('recording-active');
                iconRecord.className = "fa-solid fa-circle text-red-500";
                textRecord.innerText = "KAYDET";
                timerDisplay.classList.add('hidden');
                clearInterval(recordTimerInterval);
                timerDisplay.innerText = "00:00"; // Sıfırla

                // Eğer elinde kaydedilmiş veri varsa, oynat butonunu aktif et
                if (recordedData.length > 0) {
                    btnPlay.disabled = false;
                    btnPlay.classList.remove('opacity-50', 'cursor-not-allowed');
                    btnPlay.classList.add('hover:text-white');
                }
            }
        }

        function updatePlaybackUI() {
            const btnPlay = document.getElementById('btn-play');
            const iconPlay = document.getElementById('icon-play');
            const textPlay = document.getElementById('text-play');
            const btnRecord = document.getElementById('btn-record');
            const playbackOverlay = document.getElementById('playback-overlay');

            if (isPlaying) {
                // Oynatma Başladı
                btnPlay.classList.add('playing-active');
                iconPlay.className = "fa-solid fa-square border border-green-500 rounded-sm w-[1.5vh] h-[1.5vh] bg-green-500"; // Kare ikon
                textPlay.innerText = "DURDUR";

                // Kayıt butonunu deaktif et
                btnRecord.disabled = true;
                btnRecord.classList.add('opacity-50', 'cursor-not-allowed');

                // Ekrandaki tüm kontrolleri kilitleyen siyah tam ekran filtreyi aktif et
                if (playbackOverlay) playbackOverlay.classList.remove('hidden');
            } else {
                // Oynatma Bitti / Durduruldu
                btnPlay.classList.remove('playing-active');
                iconPlay.className = "fa-solid fa-play text-green-500 text-[2.2vh]";
                textPlay.innerText = "OYNAT";

                // Kayıt butonunu tekrar aktif et
                btnRecord.disabled = false;
                btnRecord.classList.remove('opacity-50', 'cursor-not-allowed');

                // Kontrol kilidini aç
                if (playbackOverlay) playbackOverlay.classList.add('hidden');
            }
        }

        // 2. Zaman Sayacı (00:00 Formatı)
        function startRecordingTimer() {
            const timerDisplay = document.getElementById('recording-timer');
            recordingStartTime = Date.now();

            recordTimerInterval = setInterval(() => {
                let elapsedMs = Date.now() - recordingStartTime;

                // Eğer Max Sınırı (3 DK) geçerse, kaydı otomatik durdur
                if (elapsedMs >= MAX_RECORDING_TIME_MS) {
                    log("Maksimum Kayıt Süresine Ulaşıldı (3 Dk).");
                    toggleRecording(); // Durdur
                    return;
                }

                // Formatlama: 02:15 gibi
                let totalSeconds = Math.floor(elapsedMs / 1000);
                let minutes = Math.floor(totalSeconds / 60);
                let seconds = totalSeconds % 60;

                let strMin = minutes < 10 ? "0" + minutes : minutes;
                let strSec = seconds < 10 ? "0" + seconds : seconds;

                timerDisplay.innerText = `${strMin}:${strSec}`;
            }, 1000); // Saniyede bir güncelle
        }

        // 3. Buton Tıklama İşlemleri
        function toggleRecording() {
            if (isPlaying) {
                log("Önce oynatmayı durdurmalısınız.");
                return;
            }

            if (!isRecording) {
                // KAYDA BAŞLA
                recordedData = []; // Eski kaydı sil
                isRecording = true;
                startRecordingTimer();
                log("Kayıt Başladı...");

                // İlk boş referans noktasını ekleyebiliriz (opsiyonel)
                // Bu, sonradan gelen değişimlerin ne zaman başladığını belirler.
                let initialData = {
                    arm: currentArm,
                    head: currentHead,
                    speed: currentSpeed,
                    mood: currentMood,
                    direction: direction
                };
                recordDataPacket(initialData);

            } else {
                // KAYDI DURDUR
                isRecording = false;
                log(`Kayıt Durduruldu. ${recordedData.length} Emir Kaydedildi.`);
            }

            updateRecordingUI();
        }

        function togglePlayback() {
            if (isRecording) {
                log("Önce kaydı durdurmalısınız.");
                return;
            }

            if (recordedData.length === 0) {
                log("Oynatılacak kaydedilmiş hareket bulunamadı.");
                return;
            }

            if (!isPlaying) {
                // OYNATMAYA BAŞLA
                isPlaying = true;
                log("Kayıt Oynatılıyor...");
                updatePlaybackUI();
                startPlayback();
            } else {
                // OYNATMAYI DURDUR
                stopPlayback();
            }
        }

        // 4. Veri Kaydetme Fonksiyonu
        // Bu fonksiyon, ESP'ye veri yollanan ana `sendData()` fonksiyonuna ENTEGRE EDİLMELİDİR.
        function recordDataPacket(dataPacket) {
            if (!isRecording) return;

            let currentOffset = Date.now() - recordingStartTime;

            // Eğer paket 3 dakikayı geçmişse ama interval henüz yakalamamışsa kaydetme
            if (currentOffset > MAX_RECORDING_TIME_MS) return;

            // Zaman bilgisini ekleyip kopyasını alıyoruz
            let packetToSave = Object.assign({}, dataPacket);
            packetToSave.timeOffset = currentOffset;

            recordedData.push(packetToSave);
        }

        // 5. Oynatma Mantığı
        function startPlayback() {
            // Önce olası açık timeoutları temizle
            playbackTimeouts.forEach(clearTimeout);
            playbackTimeouts = [];

            if (recordedData.length === 0) {
                stopPlayback();
                return;
            }

            // Oynatma başladığındaki anı "0" kabul ediyoruz.
            // Fakat robotun pozisyonunun ilk baştaki gibi olmasına dikkat etmek gerekir.

            let lastItemOffset = recordedData[recordedData.length - 1].timeOffset + 1000; // Son komuttan 1 saniye sonra tamamen dursun

            recordedData.forEach((packet, index) => {
                let timeoutId = setTimeout(() => {
                    if (!isPlaying) return; // Oynatma durdurulmuşsa işleme

                    // ESP'ye C++ Tarafının anladığı formatta veriyi bas:
                    // timeOffset gibi parametreler gitmesin diye süzüyoruz
                    let espData = {
                        arm: packet.arm,
                        head: packet.head,
                        speed: packet.speed,
                        mood: packet.mood,
                        direction: packet.direction
                    };

                    // Konsola yaz ki oynatırken ne gönderdiğimizi görelim
                    console.log("[OYNATILIYOR] ESP'ye Giden:", espData);

                    if (websocket && websocket.readyState === WebSocket.OPEN) {
                        websocket.send(JSON.stringify(espData));
                    }

                    // Arayüzdeki slider'ları da o komuta uygun olarak GÜNCELLE
                    // ki sanki hayalet bir el kullanıyormuş gibi hissiyat versin:
                    document.getElementById('armSlider').value = packet.arm;
                    document.getElementById('headSlider').value = packet.head;
                    document.getElementById('speedSlider').value = packet.speed;
                    currentArm = packet.arm;
                    currentHead = packet.head;
                    currentSpeed = packet.speed;
                    updateSliderDisplays();

                }, packet.timeOffset);

                playbackTimeouts.push(timeoutId);
            });

            // En son kaydın sonunda otomatik olarak "DUR" komutu bas ve oynatmayı bitir
            let stopId = setTimeout(() => {
                if (isPlaying) {
                    log("Oynatma Tamamlandı.");

                    // İş bitince motorları durdur (Güvenlik Önlemi)
                    let stopData = { arm: currentArm, head: currentHead, speed: currentSpeed, mood: "DEFAULT", direction: "STOP" };
                    if (websocket && websocket.readyState === WebSocket.OPEN) {
                        websocket.send(JSON.stringify(stopData));
                    }

                    stopPlayback();
                }
            }, lastItemOffset);

            playbackTimeouts.push(stopId);
        }

        function stopPlayback() {
            isPlaying = false;
            // Sıradaki tüm planlanmış emirleri iptal et
            playbackTimeouts.forEach(clearTimeout);
            playbackTimeouts = [];

            // UI'ı normale döndür
            updatePlaybackUI();
            log("Oynatma İptal Edildi/Bitti.");
        }

    </script>
</body>

</html>
