<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel - Wi-Fi Kurulumu</title>
    <style>
        /* PURE CSS FOR OFFLINE AP MODE */
        :root {
            --neon-blue: #00f3ff;
            --neon-green: #32ff09;
            --neon-red: #ff3c3c;
            --bg-color: #050505;
            --panel-bg: #111;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            background-color: var(--panel-bg);
            border: 2px solid var(--neon-blue);
            border-radius: 15px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            text-align: center;
            display: flex;
            flex-direction: column;
            max-height: 90vh;
        }
        h1 {
            color: var(--neon-blue);
            font-size: 24px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .network-list {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #333;
            background: #0a0a0a;
            border-radius: 8px;
            margin-bottom: 20px;
            padding: 10px;
            text-align: left;
        }
        .network-item {
            padding: 12px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .network-item:last-child { border-bottom: none; }
        .network-item:active {
            background: rgba(0, 243, 255, 0.2);
        }
        .network-name { font-weight: bold; }
        .network-rssi { font-size: 12px; color: #777; }
        
        input[type="password"] {
            width: 100%;
            padding: 15px;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
            margin-bottom: 20px;
            font-family: inherit;
            font-size: 16px;
            outline: none;
        }
        input[type="password"]:focus {
            border-color: var(--neon-green);
            box-shadow: 0 0 10px rgba(50, 255, 9, 0.3);
        }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .btn-scan {
            background: rgba(0, 243, 255, 0.1);
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            margin-bottom: 20px;
        }
        .btn-scan:active { background: var(--neon-blue); color: #000; }
        
        .btn-connect {
            background: rgba(50, 255, 9, 0.2);
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
        }
        .btn-connect:active { background: var(--neon-green); color: #000; }
        
        .btn-cancel {
            background: rgba(255, 60, 60, 0.1);
            color: var(--neon-red);
            border: 1px solid var(--neon-red);
            margin-top: 10px;
        }
        .btn-cancel:active { background: var(--neon-red); color: #000; }

        .hidden { display: none !important; }
        #loading { color: var(--neon-blue); margin: 20px 0; font-style: italic; }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
        
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <h1>WI-FI BAĞLANTISI</h1>
        <p>Pixel'i ağınıza bağlayın</p>

        <button class="btn-scan" id="btn-scan" onclick="scanWifi()">Ağları Tara</button>
        
        <div id="loading" class="hidden">Taranıyor, lütfen bekleyin...</div>

        <div class="network-list hidden" id="network-list">
            <!-- JS ile doldurulacak -->
        </div>

        <div id="connect-form" class="hidden">
            <h3 id="selected-ssid" style="color: var(--neon-green); margin-bottom: 15px;">Ağ Adı</h3>
            <input type="password" id="wifi-pass" placeholder="Şifre (Varsa)">
            <button class="btn-connect" onclick="connectWifi()">Bağlan</button>
            <button class="btn-cancel" onclick="cancelConnect()">İptal</button>
        </div>
    </div>

    <script>
        let selectedNetwork = "";

        // Sayfa yüklendiğinde otomatik tara
        document.addEventListener('DOMContentLoaded', () => {
            scanWifi();
        });

        function scanWifi() {
            document.getElementById('btn-scan').classList.add('hidden');
            document.getElementById('network-list').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('connect-form').classList.add('hidden');
            document.getElementById('loading').innerText = "Taranıyor, lütfen bekleyin...";

            doScan();
        }

        function doScan() {
            fetch('/api/wifi-scan')
                .then(response => {
                    if (response.status === 202) {
                        setTimeout(doScan, 1000);
                        return null;
                    }
                    return response.json();
                })
                .then(data => {
                    if (!data) return; // Halen taranıyor (202)

                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('btn-scan').classList.remove('hidden');
                    document.getElementById('btn-scan').innerText = "Yeniden Tara";
                    
                    const list = document.getElementById('network-list');
                    list.innerHTML = '';
                    
                    if (data.length === 0) {
                        list.innerHTML = '<div style="padding: 10px; text-align: center; color: var(--neon-red);">Ağ bulunamadı.</div>';
                    } else {
                        data.forEach(net => {
                            let lockStr = net.secure ? '🔒' : '🔓';
                            let html = `
                                <div class="network-item" onclick="selectNetwork('${net.ssid}')">
                                    <span class="network-name">${net.ssid}</span>
                                    <span class="network-rssi">${net.rssi} dBm ${lockStr}</span>
                                </div>
                            `;
                            list.innerHTML += html;
                        });
                    }
                    list.classList.remove('hidden');
                })
                .catch(err => {
                    document.getElementById('loading').innerText = "Tarama Hatası! Yeniden deneniyor...";
                    setTimeout(doScan, 2000);
                });
        }

        function selectNetwork(ssid) {
            selectedNetwork = ssid;
            document.getElementById('selected-ssid').innerText = ssid;
            document.getElementById('network-list').classList.add('hidden');
            document.getElementById('btn-scan').classList.add('hidden');
            document.getElementById('connect-form').classList.remove('hidden');
            document.getElementById('wifi-pass').value = '';
            document.getElementById('wifi-pass').focus();
        }

        function cancelConnect() {
            document.getElementById('connect-form').classList.add('hidden');
            document.getElementById('network-list').classList.remove('hidden');
            document.getElementById('btn-scan').classList.remove('hidden');
        }

        function connectWifi() {
            const pass = document.getElementById('wifi-pass').value;
            
            // UI Güncelle
            document.getElementById('connect-form').innerHTML = '<h3 style="color:var(--neon-green)">Bağlanılıyor...</h3><p style="margin-top:15px; color:#fff;">Robot yeniden başlatılacak. Lütfen ana Wi-Fi ağınıza geçip Pixel arayüzüne veya <b>http://robot.local</b> adresine tekrar bağlanın.</p>';

            // POST İsteği
            fetch('/api/wifi-connect', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'ssid=' + encodeURIComponent(selectedNetwork) + '&pass=' + encodeURIComponent(pass)
            }).then(() => {
                // Başarılı
            }).catch(() => {});
        }
    </script>
</body>
</html>
